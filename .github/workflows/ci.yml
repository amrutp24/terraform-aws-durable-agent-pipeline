name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Supply-chain policy: every third-party action is pinned to a full commit SHA,
# never a mutable tag. The March 2026 trivy-action compromise force-pushed
# malware to 76 of 77 version tags - tag pinning is a proven attack vector.
# The trailing comment records the tag each SHA corresponds to.

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - run: terraform fmt -check -recursive

      - name: Validate module
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate example
        working-directory: examples/complete
        run: |
          mkdir -p build/orchestrator build/api
          touch build/orchestrator/lambda_function.py build/api/lambda_function.py
          terraform init -backend=false
          terraform validate

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
      - run: tflint --init && tflint

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: terraform-docs up-to-date check
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: .
          config-file: .terraform-docs.yml
          fail-on-diff: "true"

  # tfsec was archived into Trivy in 2024; this runs its maintained successor,
  # hard-fail. Accepted exceptions live in .trivyignore with reasons (mirrored
  # in SECURITY_POSTURE.md). SHA below is v0.35.0 - the post-incident release
  # named safe in GHSA-69fq-xp46-6x23.
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Trivy misconfiguration scan (tfsec successor, hard fail)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"
          trivyignores: .trivyignore

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Checkov (hard fail; exceptions are inline-reasoned, see SECURITY_POSTURE.md)
        uses: bridgecrewio/checkov-action@7e3930d7acb8482fd506c495250290b269e2e640 # v12.3055.0
        with:
          directory: .
          framework: terraform
          quiet: true

  terratest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.23"

      - name: Static behavioral-test compile + example validation
        working-directory: test
        run: |
          go vet ./...
          go test -run TestExampleValidates -v -timeout 10m

      # The live durable-lifecycle test (TestDurableLifecycle) deploys real
      # infrastructure and needs AWS credentials; it runs only when the
      # repository variable TERRATEST_ENABLED is set to 'true'.
      - name: Live durable-lifecycle test
        if: ${{ vars.TERRATEST_ENABLED == 'true' }}
        working-directory: test
        env:
          TERRATEST_APPLY: "1"
        run: |
          pip install aws-durable-execution-sdk-python -t fixtures/build/orchestrator --quiet
          cp fixtures/orchestrator/lambda_function.py fixtures/build/orchestrator/
          mkdir -p fixtures/build/api && cp fixtures/api/lambda_function.py fixtures/build/api/
          go test -run TestDurableLifecycle -v -timeout 30m
