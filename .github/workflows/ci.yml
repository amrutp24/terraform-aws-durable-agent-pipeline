name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - run: terraform fmt -check -recursive

      - name: Validate module
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate example
        working-directory: examples/complete
        run: |
          mkdir -p build/orchestrator build/api
          touch build/orchestrator/lambda_function.py build/api/lambda_function.py
          terraform init -backend=false
          terraform validate

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init && tflint

  # tfsec was archived into Trivy in 2024; its last release predates split S3
  # resources and reports false positives on modern Terraform. This job runs
  # its maintained successor with the same rule engine, hard-fail. Accepted
  # exceptions live in .trivyignore with reasons (mirrored in SECURITY_POSTURE.md).
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy misconfiguration scan (tfsec successor, hard fail)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"
          trivyignores: .trivyignore

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (hard fail; exceptions are inline-reasoned, see SECURITY_POSTURE.md)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true

  terratest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Static behavioral-test compile + example validation
        working-directory: test
        run: |
          go mod tidy
          go vet ./...
          go test -run TestExampleValidates -v -timeout 10m

      # The live durable-lifecycle test (TestDurableLifecycle) deploys real
      # infrastructure and needs AWS credentials; it runs only when the
      # TERRATEST_AWS_ROLE secret is configured.
      - name: Live durable-lifecycle test
        if: ${{ vars.TERRATEST_ENABLED == 'true' }}
        working-directory: test
        env:
          TERRATEST_APPLY: "1"
        run: |
          pip install aws-durable-execution-sdk-python -t fixtures/build/orchestrator --quiet
          cp fixtures/orchestrator/lambda_function.py fixtures/build/orchestrator/
          mkdir -p fixtures/build/api && cp fixtures/api/lambda_function.py fixtures/build/api/
          go test -run TestDurableLifecycle -v -timeout 30m
